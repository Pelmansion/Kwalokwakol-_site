# Blueprint Render — à lier au dépôt GitHub (branche main).
# Dans le dashboard : New > Blueprint ou appliquer ce fichier.
services:
  - type: web
    name: kwalokwakole
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kwalokwakole
          property: connectionString
      - key: GENIUS_API_KEY
        sync: false
      - key: GENIUS_API_SECRET
        sync: false

databases:
  - name: kwalokwakole
    plan: free
